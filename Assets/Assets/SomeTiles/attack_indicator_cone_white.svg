<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Pure white cone — coloring done 100% via SpriteRenderer.color in Unity -->

  <!-- Filled cone area (semi-transparent white so fill vs outline are distinguishable) -->
  <path d="M 128 128 L 248 44 A 136 136 0 0 1 248 212 Z"
        fill="white" fill-opacity="0.55"/>

  <!-- Outer edge of cone -->
  <path d="M 128 128 L 248 44 A 136 136 0 0 1 248 212 Z"
        fill="none" stroke="white" stroke-opacity="1" stroke-width="3"
        stroke-linejoin="round"/>

  <!-- Inner arc dashed -->
  <path d="M 173 80 A 68 68 0 0 1 173 176"
        fill="none" stroke="white" stroke-opacity="0.6"
        stroke-width="2" stroke-dasharray="7 5"/>

  <!-- Center ray -->
  <line x1="128" y1="128" x2="248" y2="128"
        stroke="white" stroke-opacity="0.4"
        stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Tick points on arc -->
  <circle cx="248" cy="44"  r="3.5" fill="white" fill-opacity="1"/>
  <circle cx="248" cy="212" r="3.5" fill="white" fill-opacity="1"/>
  <circle cx="248" cy="128" r="3"   fill="white" fill-opacity="0.7"/>

  <!-- Origin point -->
  <circle cx="128" cy="128" r="5"  fill="white" fill-opacity="1"/>
  <circle cx="128" cy="128" r="10" fill="none" stroke="white"
          stroke-opacity="0.6" stroke-width="2"/>
  <circle cx="128" cy="128" r="18" fill="none" stroke="white"
          stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="4 5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Cone attack indicator — origin at center-left, facing right -->
  <!-- All shapes centered on 128,128 pivot point -->

  <!-- Filled cone area -->
  <path d="M 128 128 L 248 44 A 136 136 0 0 1 248 212 Z"
        fill="#ff2a2a" fill-opacity="0.22"/>

  <!-- Outer edge of cone -->
  <path d="M 128 128 L 248 44 A 136 136 0 0 1 248 212 Z"
        fill="none" stroke="#ff4444" stroke-opacity="0.95" stroke-width="3"
        stroke-linejoin="round"/>

  <!-- Inner arc (half radius) -->
  <path d="M 173 80 A 68 68 0 0 1 173 176"
        fill="none" stroke="#ff4444" stroke-opacity="0.45"
        stroke-width="2" stroke-dasharray="7 5"/>

  <!-- Center ray line -->
  <line x1="128" y1="128" x2="248" y2="128"
        fill="none" stroke="#ff4444" stroke-opacity="0.35"
        stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Upper ray line -->
  <line x1="128" y1="128" x2="248" y2="44"
        fill="none" stroke="#ff4444" stroke-opacity="0" stroke-width="0"/>

  <!-- Tick marks on outer edge -->
  <circle cx="248" cy="44"  r="3.5" fill="#ff4444" fill-opacity="0.9"/>
  <circle cx="248" cy="212" r="3.5" fill="#ff4444" fill-opacity="0.9"/>
  <circle cx="248" cy="128" r="3"   fill="#ff4444" fill-opacity="0.6"/>

  <!-- Origin point -->
  <circle cx="128" cy="128" r="5"  fill="#ff4444" fill-opacity="0.95"/>
  <circle cx="128" cy="128" r="10" fill="none" stroke="#ff4444"
          stroke-opacity="0.55" stroke-width="2"/>
  <circle cx="128" cy="128" r="18" fill="none" stroke="#ff4444"
          stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 5"/>
</svg>
